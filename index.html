<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anas Sanderwale — Associate Software Engineer</title>
<meta name="description" content="Portfolio of Anas Sanderwale, Associate Software Engineer specializing in Java, Spring Boot, RESTful APIs, SQL and React." />
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

.lg-root{
  --bg:#070b16; --bg2:#0a1020;
  --ink:#eef2ff; --ink-2:rgba(238,242,255,.66); --ink-3:rgba(238,242,255,.46);
  --line:rgba(255,255,255,.10); --line-2:rgba(255,255,255,.16);
  --glass:rgba(255,255,255,.055); --glass-2:rgba(255,255,255,.085);
  --indigo:#7c83ff; --violet:#b58cff; --cyan:#5fd2ff; --pink:#ff9ad1;
  --grad:linear-gradient(110deg,#8ea2ff 0%,#b58cff 45%,#5fd2ff 100%);
  position:relative; min-height:100vh; color:var(--ink);
  background:
    radial-gradient(1200px 700px at 80% -10%, rgba(124,131,255,.14), transparent 60%),
    radial-gradient(900px 600px at 0% 10%, rgba(95,210,255,.10), transparent 55%),
    linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
  font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
}
*{box-sizing:border-box;}
body{margin:0;background:#070b16;}
.lg-root h1,.lg-root h2,.lg-root h3{font-family:'Space Grotesk','Inter',sans-serif;margin:0;letter-spacing:-.02em;}
.lg-root p{margin:0;}
.lg-root button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
.lg-root a{color:inherit;text-decoration:none;}
html{scroll-behavior:smooth;}

.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.55;}
.orb-a{width:46vw;height:46vw;left:-10vw;top:-12vw;background:radial-gradient(circle at 30% 30%,#5b63d6,transparent 70%);animation:drift1 22s ease-in-out infinite;}
.orb-b{width:40vw;height:40vw;right:-12vw;top:18vh;background:radial-gradient(circle at 60% 40%,#7a4fd6,transparent 70%);animation:drift2 26s ease-in-out infinite;}
.orb-c{width:38vw;height:38vw;left:20vw;bottom:-14vw;background:radial-gradient(circle at 50% 50%,#2f8fd6,transparent 70%);animation:drift3 30s ease-in-out infinite;}
.grid-veil{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:54px 54px;-webkit-mask-image:radial-gradient(circle at 50% 30%,black,transparent 80%);mask-image:radial-gradient(circle at 50% 30%,black,transparent 80%);}
@keyframes drift1{50%{transform:translate(6vw,4vh) scale(1.08);}}
@keyframes drift2{50%{transform:translate(-5vw,5vh) scale(1.1);}}
@keyframes drift3{50%{transform:translate(4vw,-4vh) scale(1.05);}}

.glass{position:relative;background:linear-gradient(160deg,var(--glass-2),var(--glass));border:1px solid var(--line);border-radius:22px;backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);box-shadow:0 18px 50px -22px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.16);}
.glass::after{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.10),transparent 38%);pointer-events:none;opacity:.7;}

.nav{position:fixed;top:0;left:0;right:0;z-index:40;transition:.3s ease;}
.nav-inner{max-width:1160px;margin:0 auto;padding:16px 22px;display:flex;align-items:center;gap:18px;}
.nav-solid .nav-inner{margin:10px auto;padding:10px 18px;border:1px solid var(--line);background:rgba(10,14,26,.55);backdrop-filter:blur(16px);border-radius:18px;max-width:1120px;box-shadow:0 16px 40px -24px rgba(0,0,0,.8);}
.brand{display:flex;align-items:center;gap:11px;}
.brand-mark{display:grid;place-items:center;width:34px;height:34px;border-radius:11px;background:var(--grad);color:#0a0e1a;font-weight:700;font-family:'Space Grotesk';font-size:14px;box-shadow:0 6px 18px -6px rgba(124,131,255,.7);}
.brand-name{font-family:'Space Grotesk';font-weight:600;font-size:15.5px;letter-spacing:-.01em;}
.nav-links{display:flex;gap:4px;margin-left:auto;}
.nav-link{font-size:13.5px;color:var(--ink-2);padding:8px 12px;border-radius:10px;transition:.2s;position:relative;}
.nav-link:hover{color:var(--ink);background:rgba(255,255,255,.05);}
.nav-link.active{color:var(--ink);}
.nav-link.active::after{content:"";position:absolute;left:12px;right:12px;bottom:3px;height:2px;border-radius:2px;background:var(--grad);}
.nav-cta{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:500;padding:9px 15px;border-radius:11px;background:var(--glass-2);border:1px solid var(--line-2);transition:.2s;}
.nav-cta:hover{background:rgba(255,255,255,.14);transform:translateY(-1px);}
.hamburger{display:none;margin-left:auto;padding:8px;border-radius:10px;background:var(--glass-2);border:1px solid var(--line);}
.mobile-menu{position:fixed;z-index:39;top:70px;left:14px;right:14px;display:flex;flex-direction:column;gap:4px;padding:12px;border-radius:18px;background:rgba(10,14,26,.82);backdrop-filter:blur(20px);border:1px solid var(--line-2);box-shadow:0 30px 60px -20px rgba(0,0,0,.8);}
.mobile-link{text-align:left;padding:12px 14px;border-radius:12px;font-size:15px;color:var(--ink-2);}
.mobile-link:hover{background:rgba(255,255,255,.06);color:var(--ink);}
.mobile-link.primary{background:var(--grad);color:#0a0e1a;font-weight:600;text-align:center;margin-top:4px;}

.section{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:92px 22px 0;scroll-margin-top:90px;}
.section-head{margin-bottom:34px;max-width:720px;}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px;}
.eyebrow-dot{width:6px;height:6px;border-radius:50%;background:var(--grad);box-shadow:0 0 12px var(--indigo);}
.section-title{font-size:clamp(26px,4vw,40px);font-weight:600;line-height:1.05;}
.section-kicker{margin-top:12px;color:var(--ink-2);font-size:15.5px;line-height:1.6;}

.reveal{opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);}
.reveal.is-visible{opacity:1;transform:none;}

.btn{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:500;padding:12px 18px;border-radius:13px;transition:.22s ease;}
.btn-primary{background:var(--grad);color:#0a0e1a;font-weight:600;box-shadow:0 14px 30px -12px rgba(124,131,255,.8);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 20px 40px -12px rgba(124,131,255,.9);}
.btn-ghost{background:var(--glass-2);border:1px solid var(--line-2);color:var(--ink);}
.btn-ghost:hover{background:rgba(255,255,255,.13);transform:translateY(-2px);}
.chip{display:inline-flex;align-items:center;font-size:12.5px;font-weight:500;padding:6px 11px;border-radius:999px;background:rgba(124,131,255,.12);border:1px solid rgba(124,131,255,.26);color:#d7daff;}
.chip-quiet{background:rgba(255,255,255,.05);border-color:var(--line);color:var(--ink-2);}

.hero{position:relative;z-index:1;max-width:1160px;margin:0 auto;padding:140px 22px 30px;min-height:92vh;display:flex;align-items:center;--mx:50%;--my:30%;}
.hero-light{position:absolute;inset:0;pointer-events:none;background:radial-gradient(420px 420px at var(--mx) var(--my),rgba(149,160,255,.16),transparent 70%);transition:background .12s;}
.hero-grid{display:grid;grid-template-columns:1.25fr .85fr;gap:48px;align-items:center;width:100%;}
.hero-name{font-size:clamp(40px,7vw,76px);font-weight:700;line-height:.98;background:linear-gradient(120deg,#ffffff 18%,#c7cdff 55%,#9fe4ff 100%);-webkit-background-clip:text;background-clip:text;color:transparent;margin-top:6px;}
.hero-role{font-size:clamp(18px,2.4vw,23px);font-weight:600;color:var(--ink);margin-top:14px;font-family:'Space Grotesk';}
.hero-tag{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.04em;color:var(--cyan);margin-top:8px;}
.hero-lede{margin-top:18px;max-width:480px;color:var(--ink-2);font-size:16px;line-height:1.65;}
.hero-actions{display:flex;gap:12px;margin-top:28px;flex-wrap:wrap;}
.hero-stats{display:flex;gap:30px;margin-top:38px;}
.stat-value{font-family:'Space Grotesk';font-size:30px;font-weight:700;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.stat-label{font-size:12.5px;color:var(--ink-3);margin-top:2px;}
.hero-card{padding:24px;}
.hero-card-top{display:flex;align-items:center;gap:13px;}
.avatar{width:52px;height:52px;border-radius:15px;display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:19px;color:#0a0e1a;background:var(--grad);box-shadow:0 10px 24px -10px rgba(124,131,255,.8);}
.hc-name{font-family:'Space Grotesk';font-weight:600;font-size:16px;}
.hc-role{font-size:13px;color:var(--ink-2);}
.status{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#a8f0c8;background:rgba(64,220,150,.10);border:1px solid rgba(64,220,150,.28);padding:5px 9px;border-radius:999px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:#3ee08a;box-shadow:0 0 10px #3ee08a;animation:pulse 2s infinite;}
@keyframes pulse{50%{opacity:.4;}}
.hero-card-list{margin-top:18px;display:flex;flex-direction:column;gap:11px;}
.hc-row{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--ink-2);}
.hc-row svg{color:var(--indigo);flex-shrink:0;}
.hero-card-tags{margin-top:18px;display:flex;flex-wrap:wrap;gap:7px;}

.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
.about-card{padding:30px;}
.about-spark{color:var(--violet);margin-bottom:14px;}
.about-text{font-size:16px;line-height:1.78;color:rgba(238,242,255,.82);}
.highlight-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.highlight{padding:20px;}
.highlight-icon{display:inline-grid;place-items:center;width:40px;height:40px;border-radius:12px;background:rgba(124,131,255,.13);border:1px solid rgba(124,131,255,.24);color:var(--indigo);margin-bottom:13px;}
.highlight-title{font-family:'Space Grotesk';font-weight:600;font-size:15.5px;}
.highlight-text{margin-top:6px;font-size:13.5px;line-height:1.6;color:var(--ink-2);}

.skills-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.skill-card{padding:22px;transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;}
.skill-card:hover{transform:translateY(-4px);border-color:var(--line-2);box-shadow:0 26px 60px -26px rgba(0,0,0,.85),inset 0 1px 0 rgba(255,255,255,.2);}
.skill-head{display:flex;align-items:center;gap:11px;margin-bottom:15px;}
.skill-icon{display:grid;place-items:center;width:36px;height:36px;border-radius:11px;background:var(--grad);color:#0a0e1a;}
.skill-label{font-family:'Space Grotesk';font-weight:600;font-size:15px;}
.skill-chips{display:flex;flex-wrap:wrap;gap:8px;}

.exp-card{padding:28px;}
.exp-head{display:flex;align-items:center;gap:15px;flex-wrap:wrap;}
.exp-icon{display:grid;place-items:center;width:44px;height:44px;border-radius:13px;background:rgba(124,131,255,.13);border:1px solid rgba(124,131,255,.24);color:var(--indigo);}
.exp-headtext{margin-right:auto;}
.exp-company{font-family:'Space Grotesk';font-weight:600;font-size:18px;}
.exp-title{font-size:14px;color:var(--ink-2);margin-top:2px;}
.exp-period{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--cyan);padding:6px 12px;border-radius:999px;background:rgba(95,210,255,.08);border:1px solid rgba(95,210,255,.22);}
.exp-list{list-style:none;padding:0;margin:22px 0 0;display:flex;flex-direction:column;gap:13px;}
.exp-list li{display:flex;gap:12px;font-size:14.5px;line-height:1.6;color:rgba(238,242,255,.82);}
.tick{flex-shrink:0;margin-top:8px;width:7px;height:7px;border-radius:50%;background:var(--grad);box-shadow:0 0 10px rgba(124,131,255,.6);}
.exp-reco{margin-top:22px;display:flex;align-items:center;gap:10px;font-size:14px;color:#ffe1b0;padding:13px 16px;border-radius:14px;background:rgba(255,196,110,.08);border:1px solid rgba(255,196,110,.22);}
.exp-reco svg{color:#ffcf7a;flex-shrink:0;}

.projects-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.project{padding:26px;transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;overflow:hidden;}
.project:hover{transform:translateY(-6px);border-color:var(--line-2);box-shadow:0 34px 70px -28px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.2);}
.project-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-3);letter-spacing:.1em;}
.project-name{font-size:19px;font-weight:600;margin-top:10px;line-height:1.15;}
.project-sub{font-size:12.5px;color:var(--cyan);font-family:'JetBrains Mono',monospace;margin-top:6px;}
.project-blurb{margin-top:14px;font-size:14px;line-height:1.62;color:rgba(238,242,255,.78);}
.project-work{margin-top:12px;font-size:13px;line-height:1.6;color:var(--ink-3);}
.project-tags{margin-top:16px;display:flex;flex-wrap:wrap;gap:7px;}

.awards-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.award{padding:24px;display:flex;gap:16px;align-items:flex-start;transition:transform .25s ease,border-color .25s;}
.award:hover{transform:translateY(-4px);border-color:var(--line-2);}
.award-icon{flex-shrink:0;display:grid;place-items:center;width:48px;height:48px;border-radius:14px;background:linear-gradient(160deg,#ffd27a,#ff9ad1);color:#3a230a;box-shadow:0 12px 28px -12px rgba(255,180,120,.7);}
.award-title{font-family:'Space Grotesk';font-weight:600;font-size:16.5px;}
.award-org{font-size:12.5px;color:var(--cyan);margin-top:3px;}
.award-text{font-size:13.5px;color:var(--ink-2);margin-top:8px;line-height:1.55;}

.cert{padding:26px;}
.cert-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.cert-icon{display:grid;place-items:center;width:42px;height:42px;border-radius:12px;background:var(--grad);color:#0a0e1a;}
.cert-headtext{margin-right:auto;}
.cert-name{font-family:'Space Grotesk';font-weight:600;font-size:16.5px;}
.cert-org{font-size:13px;color:var(--ink-2);margin-top:2px;}
.cert-period{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--cyan);padding:5px 11px;border-radius:999px;background:rgba(95,210,255,.08);border:1px solid rgba(95,210,255,.22);}
.cert-list{list-style:none;padding:0;margin:20px 0 0;display:flex;flex-direction:column;gap:11px;}
.cert-list li{display:flex;gap:11px;font-size:14px;line-height:1.55;color:rgba(238,242,255,.8);}

.edu-timeline{position:relative;display:flex;flex-direction:column;gap:16px;padding-left:8px;}
.edu-row{display:flex;gap:18px;align-items:stretch;}
.edu-node{flex-shrink:0;display:grid;place-items:center;width:38px;height:38px;border-radius:50%;background:rgba(124,131,255,.12);border:1px solid rgba(124,131,255,.3);color:var(--indigo);align-self:center;}
.edu-card{flex:1;padding:18px 22px;transition:transform .25s ease,border-color .25s;}
.edu-card:hover{transform:translateX(4px);border-color:var(--line-2);}
.edu-top{display:flex;align-items:center;gap:12px;}
.edu-level{font-family:'Space Grotesk';font-weight:700;font-size:15px;color:var(--violet);}
.edu-period{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-3);}
.edu-school{margin-top:6px;font-size:14.5px;color:rgba(238,242,255,.85);}
.edu-score{margin-top:6px;font-size:13px;color:var(--cyan);font-weight:500;}

.contact-card{padding:34px;}
.contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.contact-item{display:flex;flex-direction:column;gap:4px;padding:18px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid var(--line);transition:.22s;}
a.contact-item:hover{background:rgba(255,255,255,.08);transform:translateY(-3px);border-color:var(--line-2);}
.contact-ic{display:grid;place-items:center;width:38px;height:38px;border-radius:11px;background:rgba(124,131,255,.13);border:1px solid rgba(124,131,255,.24);color:var(--indigo);margin-bottom:6px;}
.contact-k{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);}
.contact-v{font-size:14.5px;color:var(--ink);word-break:break-word;}
.contact-actions{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;}

.footer{position:relative;z-index:1;margin-top:96px;border-top:1px solid var(--line);}
.footer-inner{max-width:1120px;margin:0 auto;padding:28px 22px;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--ink-3);flex-wrap:wrap;gap:10px;}
.footer-built{font-family:'JetBrains Mono',monospace;letter-spacing:.04em;}

@media (max-width:980px){
  .nav-links,.nav-cta{display:none;}
  .hamburger{display:inline-grid;place-items:center;}
  .hero-grid{grid-template-columns:1fr;gap:34px;}
  .hero{padding-top:120px;min-height:auto;}
  .hero-card-wrap{max-width:460px;}
  .about-grid{grid-template-columns:1fr;}
  .skills-grid{grid-template-columns:1fr 1fr;}
  .projects-grid{grid-template-columns:1fr 1fr;}
}
@media (max-width:680px){
  .section{padding-top:74px;}
  .skills-grid,.projects-grid,.awards-grid,.contact-grid,.highlight-grid{grid-template-columns:1fr;}
  .hero-stats{gap:22px;}
  .stat-value{font-size:26px;}
  .contact-actions .btn{flex:1;justify-content:center;}
}
@media (prefers-reduced-motion:reduce){
  .reveal{transition:none;opacity:1;transform:none;}
  .orb,.status-dot{animation:none;}
  html{scroll-behavior:auto;}
}
#root-loading{display:grid;place-items:center;min-height:100vh;color:#9aa3c7;font-family:'Inter',sans-serif;font-size:14px;}
</style>

    const els = document.querySelectorAll(".reveal");
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add("is-visible"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -8% 0px" });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);

    const ids = NAV.map((n) => n.id);
    const pick = () => {
      const line = window.scrollY + 140;
      let current = ids[0];
      for (const id of ids) {
        const el = document.getElementById(id);
        if (!el) continue;
        const top = el.getBoundingClientRect().top + window.scrollY;
        if (top <= line) current = id;
      }
      if (window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 2) {
        current = ids[ids.length - 1];
      }
      setActive(current);
    };
    const onScroll = () => { setScrolled(window.scrollY > 24); pick(); };
    window.addEventListener("scroll", onScroll, { passive: true });
    window.addEventListener("resize", pick);
    onScroll();
    return () => { window.removeEventListener("scroll", onScroll); window.removeEventListener("resize", pick); };
